    let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
    let currentGuideId = null;

    function updateFavoritesBadge() {
        const badge = document.getElementById('favBadge');
        if (favorites.length > 0) {
            badge.textContent = favorites.length;
            badge.classList.remove('hidden');
        } else {
            badge.classList.add('hidden');
        }
    }

    function toggleFavorites() {
        const modal = document.getElementById('favoritesModal');
        modal.classList.toggle('hidden');
        updateFavoritesList();
    }

    function updateFavoritesList() {
        const container = document.getElementById('favoritesList');
        if (favorites.length === 0) {
            container.innerHTML = '<p class="text-gray-500 text-center py-8">暂无收藏攻略</p>';
            return;
        }
        const favGuides = favorites.map(id => guides.find(g => g.id === id)).filter(Boolean);
        container.innerHTML = favGuides.map(g => `
            <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg hover:bg-gray-100 cursor-pointer mb-2" 
                 onclick="window.location.href='detail.html?id=${g.id}'; toggleFavorites();">
                <div>
                    <span class="text-xs text-blue-600">${g.category}</span>
                    <p class="font-medium mt-1 text-sm">${g.title}</p>
                </div>
                <button onclick="event.stopPropagation(); removeFavorite(${g.id})" class="text-red-500 text-sm">删除</button>
            </div>
        `).join('');
    }

    function removeFavorite(id) {
        favorites = favorites.filter(f => f !== id);
        localStorage.setItem('favorites', JSON.stringify(favorites));
        updateFavoritesBadge();
        updateFavoritesList();
        if (currentGuideId === id) {
            updateFavoriteButton();
        }
    }

    function toggleFavorite(id) {
        const index = favorites.indexOf(id);
        if (index > -1) {
            favorites.splice(index, 1);
        } else {
            favorites.push(id);
        }
        localStorage.setItem('favorites', JSON.stringify(favorites));
        updateFavoritesBadge();
        updateFavoriteButton();
    }

    function updateFavoriteButton() {
        const btn = document.getElementById('favoriteBtn');
        const isFav = favorites.includes(currentGuideId);
        if (isFav) {
            btn.className = 'px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition-colors';
            btn.innerHTML = '✅ 已收藏';
        } else {
            btn.className = 'px-4 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600 transition-colors';
            btn.innerHTML = '⭐ 收藏攻略';
        }
    }

    function formatViews(views) {
        if (views >= 10000) return (views / 10000).toFixed(1) + '万';
        if (views >= 1000) return (views / 1000).toFixed(1) + 'k';
        return views;
    }

    function renderGuide(guide) {
        currentGuideId = guide.id;
        const content = guide.content;
        const contentHtml = content.split('\n').map(line => {
            if (line.startsWith('## ')) {
                return `<h2 class="text-xl font-bold text-blue-600 mt-6 mb-3">${line.replace('## ', '')}</h2>`;
            }
            if (line.startsWith('### ')) {
                return `<h3 class="text-lg font-bold text-blue-500 mt-4 mb-2">${line.replace('### ', '')}</h3>`;
            }
            if (line.startsWith('|')) {
                return `<div class="overflow-x-auto"><table class="w-full border-collapse my-4">${line}</table></div>`;
            }
            if (line.startsWith('- ')) {
                return `<li class="ml-4 text-gray-600">${line.replace('- ', '')}</li>`;
            }
            if (line.trim()) {
                return `<p class="text-gray-600 leading-relaxed mb-3">${line}</p>`;
            }
            return '';
        }).join('');

        const relatedGuides = guide.related.map(id => guides.find(g => g.id === id)).filter(Boolean);

        document.getElementById('guideContent').innerHTML = `
            <div class="p-6">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <span class="text-xs text-blue-600 bg-blue-100 px-2 py-1 rounded">${guide.category}</span>
                        <h1 class="text-2xl font-bold text-gray-800 mt-3 mb-2">${guide.title}</h1>
                        <div class="flex gap-4 text-gray-500 text-sm">
                            <span>📅 ${guide.date}</span>
                            <span>👁️ ${formatViews(guide.views)}阅读</span>
                        </div>
                    </div>
                    <button id="favoriteBtn" onclick="toggleFavorite(${guide.id})" 
                        class="px-4 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600 transition-colors">
                        ⭐ 收藏攻略
                    </button>
                </div>
                
                <div class="border-t border-gray-200 pt-6">
                    ${contentHtml}
                </div>
                
                <!-- 正文中部广告位 -->
                <div class="ad-placeholder h-24 md:h-32 rounded-xl my-8">
                    <span>【正文中部广告位】</span>
                </div>
            </div>
            
            <!-- 相关攻略推荐 -->
            <div class="bg-gray-50 px-6 py-4">
                <h3 class="font-bold text-lg mb-4">📖 相关攻略推荐</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    ${relatedGuides.map(g => `
                        <article class="bg-white rounded-lg p-4 shadow-sm cursor-pointer hover:shadow-md transition-shadow" 
                                 onclick="window.location.href='detail.html?id=${g.id}'">
                            <span class="text-xs text-blue-600">${g.category}</span>
                            <h4 class="font-medium mt-1 text-sm line-clamp-2">${g.title}</h4>
                        </article>
                    `).join('')}
                </div>
            </div>
            
            <!-- 评论区 -->
            <div class="p-6">
                <h3 class="font-bold text-lg mb-4">💬 玩家评论</h3>
                <div class="space-y-4">
                    ${guide.comments.map(c => `
                        <div class="bg-gray-50 rounded-lg p-4">
                            <div class="flex justify-between items-center">
                                <span class="font-medium text-blue-600">${c.user}</span>
                                <span class="text-gray-400 text-xs">${c.time}</span>
                            </div>
                            <p class="text-gray-600 mt-2">${c.content}</p>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;

        updateFavoriteButton();
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateFavoritesBadge();
        
        const params = new URLSearchParams(window.location.search);
        const guideId = parseInt(params.get('id')) || 1;
        const guide = guides.find(g => g.id === guideId) || guides[0];
        
        // 更新页面标题
        document.title = guide.title + ' - 疯狂水世界攻略站';
        
        renderGuide(guide);
        
        // 移动端菜单
        document.getElementById('menuBtn').addEventListener('click', () => {
            document.getElementById('mobileMenu').classList.toggle('hidden');
        });
    });
    </script>
